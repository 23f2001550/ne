name: Daily Update

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Update timestamp file 23f2001550@ds.study.iitm.ac.in
      run: |
        date > last_update.txt
        echo "Daily update triggered at $(date)" >> update_log.txt

    - name: Commit and push changes
      run: |
        sleep 10
        git config --local user.email "23f2001550@ds.study.iitm.ac.in"
        git config --local user.name "github-actions[bot]"
        git add last_update.txt update_log.txt
        git commit -m "chore: daily update automated [$(date)]"
        git push origin HEAD:${{ github.ref }}
